global:
  scrape_interval: 5s      # Pull metrics mỗi 5 giây

scrape_configs:
  - job_name: 'banking-api'
    static_configs:
#      - targets: [ 'host.docker.internal:8080' ]   # Mac/Windows
#      - targets: [ '172.17.0.1:8080' ]   # Linux
      - targets: [ '172.21.192.1:8080' ]   # IP Gateway của WSL2 (đây là IP trỏ về Windows host)
      # Linux dùng: targets: ['172.17.0.1:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s